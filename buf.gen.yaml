# buf.gen.yaml – Code generation configuration
# https://buf.build/docs/configuration/v2/buf-gen-yaml
version: v2

clean: true

inputs:
  - directory: proto

plugins:
  # Generate TypeScript message types and ConnectRPC service stubs
  # In @bufbuild/protoc-gen-es v2, services are generated automatically
  - local: protoc-gen-es
    out: src/gen
    opt:
      - target=ts
