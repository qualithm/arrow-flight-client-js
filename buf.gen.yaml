# buf.gen.yaml – Code generation configuration
# https://buf.build/docs/configuration/v2/buf-gen-yaml
version: v2

clean: true

inputs:
  - directory: proto

plugins:
  # Generate TypeScript message types
  - local: protoc-gen-es
    out: src/gen
    opt:
      - target=ts

  # Generate ConnectRPC service client stubs
  - local: protoc-gen-connect-es
    out: src/gen
    opt:
      - target=ts
